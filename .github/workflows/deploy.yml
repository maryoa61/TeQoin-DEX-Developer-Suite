name: Deploy DEX Contracts to TeQoin Network

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy-dex:
    name: Compile & Deploy Uniswap V2
    runs-on: ubuntu-latest

    steps:
      - name: Git Checkout
        uses: actions/checkout@v3

      - name: Configure Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Hardhat dependencies
        run: npm install

      - name: Run Hardhat Compiler
        # اجرای مستقیم از مسیر محلی برای جلوگیری از خطای HHE22
        run: ./node_modules/.bin/hardhat compile

      - name: Deploy Contracts to TeQoin EVM
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          TEQOIN_RPC_URL: ${{ secrets.TEQOIN_RPC_URL || 'https://rpc.teqoin.com' }}
        # اجرای مستقیم از مسیر محلی
        run: ./node_modules/.bin/hardhat run scripts/deploy.js --network teqoin
