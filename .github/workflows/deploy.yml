
name: Deploy DEX Contracts to TeQoin Network

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy-dex:
    name: Compile & Deploy Uniswap V2
    runs-on: ubuntu-latest

    steps:
      - name: Git Checkout
        uses: actions/checkout@v3

      - name: Configure Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install
          npm install @openzeppelin/contracts @nomicfoundation/hardhat-toolbox hardhat ethers --save-dev

      - name: Run Hardhat Compiler
        run: npx hardhat compile

      - name: Deploy Contracts
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          TEQOIN_RPC_URL: ${{ secrets.TEQOIN_RPC_URL || 'https://rpc.teqoin.com' }}
        run: npx hardhat run scripts/deploy.cjs --network teqoin
