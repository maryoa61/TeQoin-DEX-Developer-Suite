name: Deploy DEX Contracts to TeQoin Network

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy-dex:
    name: Compile & Deploy Uniswap V2
    runs-on: ubuntu-latest

    steps:
      - name: Git Checkout
        uses: actions/checkout@v3

      - name: Configure Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        # این دستور هم پکیج‌های پروژه رو نصب می‌کنه هم OpenZeppelin که اضافه کردی
        run: npm install

      - name: Run Hardhat Compiler
        run: ./node_modules/.bin/hardhat compile

      - name: Deploy Contracts
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          TEQOIN_RPC_URL: ${{ secrets.TEQOIN_RPC_URL || 'https://rpc.teqoin.com' }}
        # در اینجا می‌تونی با تغییر این دستور، اسکریپت‌های مختلف رو اجرا کنی
        run: ./node_modules/.bin/hardhat run scripts/deploy-token.js --network teqoin
